[module/backlight]
type = custom/script

exec = $HOME/.config/polybar/scripts/backlight.sh
tail = true
interval = 0
 
scroll-up = $HOME/.config/polybar/scripts/backlight.sh increase
scroll-down = $HOME/.config/polybar/scripts/backlight.sh decrease

format-background = ${colors.label}
format-foreground = ${colors.white}
format-prefix = %{T5}  %{T-}
format-prefix-background = ${colors.prefix}
format-prefix-foreground = ${colors.white}
format-prefix-padding = 1
